# Release Workflow
#
# This workflow creates a GitHub release with Android release artifacts and an
# iOS simulator build.
# Triggered manually or when a version tag is pushed.
#
# Usage:
#   1. Push a tag: git tag v1.0.0 && git push origin v1.0.0
#   2. Or manually trigger from Actions tab
#
# Copyright (c) 2024 Vocdoni Association
# SPDX-License-Identifier: AGPL-3.0-or-later

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

  push:
    tags:
      - "v*"

env:
  RUST_VERSION: "1.89"
  PROVER_REPO_URL: "https://github.com/vocdoni/vocdoni-passport-prover.git"
  PROVER_REPO_REF: "main"
  NODE_VERSION: "20"
  DOCKER_IMAGE: "vocdoni-passport-android"

jobs:
  # Determine version from tag or input
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      android_version_name: ${{ steps.version.outputs.android_version_name }}
      
    steps:
      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "android_version_name=${VERSION#v}" >> $GITHUB_OUTPUT

  # Run tests first
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --passWithNoTests

  # Build Android release artifacts (heavy Docker build — use self-hosted runner with Docker)
  build-android:
    name: Build Android Release Artifacts
    runs-on: [self-hosted, linux, X64]
    timeout-minutes: 180
    needs: [prepare, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-release-${{ hashFiles('docker/apk.Dockerfile', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-release-
            ${{ runner.os }}-buildx-android-

      - name: Prepare prover source
        run: |
          mkdir -p vendor/vocdoni-passport-prover
          rm -rf vendor/vocdoni-passport-prover/*
          PROVER_TMP_DIR=$(mktemp -d /tmp/vocdoni-passport-prover.XXXXXX)
          trap 'rm -rf "$PROVER_TMP_DIR"' EXIT

          git clone --depth 1 --branch ${{ env.PROVER_REPO_REF }} \
            ${{ env.PROVER_REPO_URL }} "$PROVER_TMP_DIR"
          cp "$PROVER_TMP_DIR/Cargo.toml" vendor/vocdoni-passport-prover/
          cp "$PROVER_TMP_DIR/Cargo.lock" vendor/vocdoni-passport-prover/
          cp -R "$PROVER_TMP_DIR/crates" vendor/vocdoni-passport-prover/

      - name: Prepare Android signing materials
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
          ANDROID_UPLOAD_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
          ANDROID_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
        run: |
          set -euo pipefail

          if [ -z "$ANDROID_UPLOAD_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_UPLOAD_KEYSTORE_BASE64 secret is required for release builds"
            exit 1
          fi

          if [ -z "$ANDROID_UPLOAD_KEYSTORE_PASSWORD" ]; then
            echo "::error::ANDROID_UPLOAD_KEYSTORE_PASSWORD secret is required for release builds"
            exit 1
          fi

          if [ -z "$ANDROID_UPLOAD_KEY_ALIAS" ]; then
            echo "::error::ANDROID_UPLOAD_KEY_ALIAS secret is required for release builds"
            exit 1
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/android-upload-keystore.jks"
          python3 - <<'PY' "$KEYSTORE_PATH"
          import base64
          import binascii
          import os
          import pathlib
          import sys

          raw = "".join(os.environ["ANDROID_UPLOAD_KEYSTORE_BASE64"].split())
          try:
              decoded = base64.b64decode(raw, validate=True)
          except binascii.Error as exc:
              print(f"::error::ANDROID_UPLOAD_KEYSTORE_BASE64 is not valid base64: {exc}")
              raise SystemExit(1)

          pathlib.Path(sys.argv[1]).write_bytes(decoded)
          PY

          validate_keystore() {
            local store_type="$1"
            docker run --rm \
              -e STOREPASS="$ANDROID_UPLOAD_KEYSTORE_PASSWORD" \
              -e STORETYPE="$store_type" \
              -e ALIAS="$ANDROID_UPLOAD_KEY_ALIAS" \
              -v "$RUNNER_TEMP:/work:ro" \
              eclipse-temurin:21-jdk \
              sh -lc 'keytool -list -keystore /work/android-upload-keystore.jks -storepass "$STOREPASS" -storetype "$STORETYPE" -alias "$ALIAS" >/dev/null 2>&1'
          }

          if validate_keystore JKS; then
            echo "ANDROID_UPLOAD_STORE_TYPE=JKS" >> $GITHUB_ENV
          elif validate_keystore PKCS12; then
            echo "ANDROID_UPLOAD_STORE_TYPE=PKCS12" >> $GITHUB_ENV
          else
            echo "::error::Decoded keystore is not a readable JKS or PKCS12 store, or the alias/password is incorrect"
            exit 1
          fi

      - name: Build Android release artifacts
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/apk.Dockerfile
          build-args: |
            GRADLE_TASKS=assembleRelease bundleRelease
            ANDROID_VERSION_NAME=${{ needs.prepare.outputs.android_version_name }}
            ANDROID_VERSION_CODE=${{ github.run_number }}
            ANDROID_UPLOAD_STORE_TYPE=${{ env.ANDROID_UPLOAD_STORE_TYPE }}
          tags: ${{ env.DOCKER_IMAGE }}:latest
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          secrets: |
            android_keystore_base64=${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
            android_keystore_password=${{ secrets.ANDROID_UPLOAD_KEYSTORE_PASSWORD }}
            android_key_alias=${{ secrets.ANDROID_UPLOAD_KEY_ALIAS }}
            android_key_password=${{ secrets.ANDROID_UPLOAD_KEY_PASSWORD }}

      - name: Extract Android release artifacts
        run: |
          mkdir -p out
          CONTAINER_ID=$(docker create ${{ env.DOCKER_IMAGE }}:latest)
          docker cp "$CONTAINER_ID:/out/." out/
          docker rm "$CONTAINER_ID"
          
          # Rename with version
          VERSION="${{ needs.prepare.outputs.version }}"
          mv out/app-release.apk "out/VocdoniPassport-${VERSION}.apk"
          mv out/app-release.aab "out/VocdoniPassport-${VERSION}.aab"
          ls -lh out/

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: out/*.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: out/*.aab
          retention-days: 30

      - name: Cleanup Android signing materials
        if: always()
        run: rm -f "$RUNNER_TEMP/android-upload-keystore.jks"

  # Build iOS app (development build for simulator)
  build-ios:
    name: Build iOS App
    runs-on: macos-15
    timeout-minutes: 90
    needs: [prepare, test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Cache Rust toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.rustup
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
          key: ${{ runner.os }}-rust-${{ env.RUST_VERSION }}

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y \
            --default-toolchain ${{ env.RUST_VERSION }} \
            --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"
          rustc --version

      - name: Add iOS Rust targets
        run: |
          source "$HOME/.cargo/env"
          rustup target add aarch64-apple-ios
          rustup target add aarch64-apple-ios-sim

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Clone vocdoni-passport-prover
        run: |
          rm -rf ../vocdoni-passport-prover
          git clone --depth 1 --branch ${{ env.PROVER_REPO_REF }} \
            ${{ env.PROVER_REPO_URL }} ../vocdoni-passport-prover

      - name: Select Xcode version
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"

      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: bundle exec pod install --repo-update

      - name: Build iOS app (Simulator)
        working-directory: ios
        run: |
          set -o pipefail

          xcodebuild \
            -workspace VocdoniPassport.xcworkspace \
            -scheme VocdoniPassport \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            EXCLUDED_ARCHS=x86_64 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcpretty --color || {
              echo "=== Build failed. Last 120 lines of log: ==="
              tail -120 "$RUNNER_TEMP/xcodebuild.log"
              exit 1
            }

          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found under DerivedData"
            exit 1
          fi
          VERSION="${{ needs.prepare.outputs.version }}"
          mkdir -p "$RUNNER_TEMP/artifacts"

          cd "$(dirname "$APP_PATH")"
          zip -r "$RUNNER_TEMP/artifacts/VocdoniPassport-iOS-Simulator-${VERSION}.zip" "$(basename "$APP_PATH")"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator
          path: ${{ runner.temp }}/artifacts/*.zip
          retention-days: 30

  # Create GitHub Release with all artifacts
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [prepare, build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: android-aab
          path: artifacts/

      - name: Download iOS build
        uses: actions/download-artifact@v4
        with:
          name: ios-simulator
          path: artifacts/

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          draft: false
          prerelease: ${{ inputs.prerelease || false }}
          generate_release_notes: true
          files: |
            artifacts/*.apk
            artifacts/*.aab
            artifacts/*.zip
          body: |
            ## Downloads
            
            | Platform | File | Description |
            |----------|------|-------------|
            | Android | `VocdoniPassport-${{ needs.prepare.outputs.version }}.apk` | Signed Android package for direct installation |
            | Android | `VocdoniPassport-${{ needs.prepare.outputs.version }}.aab` | Signed Android App Bundle for Play Console upload |
            | iOS | `VocdoniPassport-iOS-Simulator-${{ needs.prepare.outputs.version }}.zip` | Simulator build (drag to Simulator) |
            
            ### Android Installation
            1. Download the APK file
            2. Enable "Install from unknown sources" in Settings
            3. Open the APK file to install

            ### Android Play Store
            1. Upload the AAB file to the Google Play Console
            2. Use the same upload key configured in GitHub Actions secrets
            
            ### iOS Simulator
            1. Download and unzip the file
            2. Drag the .app folder onto the iOS Simulator
            
            > **Note**: For iOS device installation, a signed IPA is required. Contact the development team for TestFlight access.
